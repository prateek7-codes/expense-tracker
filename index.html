<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <span class="nav-logo">SpendWise</span>
    <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </nav>

  <div class="page">

    <!-- Hero Balance -->
    <section class="hero">
      <p class="hero-label">Total Balance</p>
      <h1 class="hero-balance" id="totalBalance">₹0.00</h1>
      <div class="hero-meta">
        <div class="meta-item">
          <span class="meta-label">Income</span>
          <span class="meta-value income-text" id="totalIncome">₹0.00</span>
        </div>
        <div class="meta-divider"></div>
        <div class="meta-item">
          <span class="meta-label">Expenses</span>
          <span class="meta-value expense-text" id="totalExpenses">₹0.00</span>
        </div>
      </div>
    </section>

    <!-- Body -->
    <div class="body-grid">

      <!-- Left col: Form + Chart -->
      <div class="left-col">

        <!-- Add Transaction -->
        <section class="section">
          <h2 class="section-title">Add Transaction</h2>

          <div class="type-toggle">
            <button class="type-btn active" data-type="expense" id="expenseBtn">Expense</button>
            <button class="type-btn" data-type="income" id="incomeBtn">Income</button>
          </div>

          <div class="field">
            <label class="field-label" for="description">Description</label>
            <input class="field-input" type="text" id="description" placeholder="e.g. Coffee, Rent, Salary…" maxlength="60" autocomplete="off" />
            <span class="field-error" id="descError"></span>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field-label" for="amount">Amount (₹)</label>
              <input class="field-input" type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" />
              <span class="field-error" id="amtError"></span>
            </div>
            <div class="field">
              <label class="field-label" for="category">Category</label>
              <select class="field-input field-select" id="category">
                <option value="">Select…</option>
                <optgroup label="Expenses" id="expenseOptions">
                  <option value="Food">🍔 Food & Dining</option>
                  <option value="Transport">🚗 Transport</option>
                  <option value="Shopping">🛍️ Shopping</option>
                  <option value="Entertainment">🎬 Entertainment</option>
                  <option value="Health">💊 Health</option>
                  <option value="Utilities">⚡ Utilities</option>
                  <option value="Education">📚 Education</option>
                  <option value="Other">📦 Other</option>
                </optgroup>
                <optgroup label="Income" id="incomeOptions" style="display:none">
                  <option value="Salary">💼 Salary</option>
                  <option value="Freelance">💻 Freelance</option>
                  <option value="Investment">📈 Investment</option>
                  <option value="Gift">🎁 Gift</option>
                  <option value="Other">📦 Other</option>
                </optgroup>
              </select>
              <span class="field-error" id="catError"></span>
            </div>
          </div>

          <button class="add-btn" id="addTransactionBtn">Add Transaction</button>
        </section>

        <!-- Analytics -->
        <section class="section">
          <h2 class="section-title">Breakdown</h2>
          <div class="chart-wrap">
            <canvas id="analyticsChart"></canvas>
            <div class="chart-empty" id="chartEmpty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
              </svg>
              <span>No expenses to show</span>
            </div>
          </div>
          <div class="legend" id="chartLegend"></div>
        </section>

      </div>

      <!-- Right col: Transactions -->
      <section class="section section--list">
        <div class="list-head">
          <h2 class="section-title">Transactions</h2>
          <span class="tx-count" id="txCount">0 entries</span>
        </div>
        <div class="tx-list" id="transactionsList">
          <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
            <p>Nothing here yet</p>
            <span>Your transactions will appear here</span>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
