<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise — Smart Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-name">SpendWise</span>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <span class="toggle-icon sun">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </span>
      <span class="toggle-icon moon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
    </button>
  </nav>

  <main class="main-content">

    <!-- Dashboard Cards -->
    <section class="dashboard" aria-label="Financial Summary">
      <div class="card card--balance">
        <div class="card-label">Total Balance</div>
        <div class="card-amount" id="totalBalance">₹0.00</div>
        <div class="card-sub">Your current net worth</div>
      </div>
      <div class="card card--income">
        <div class="card-icon income-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        </div>
        <div class="card-label">Total Income</div>
        <div class="card-amount income-text" id="totalIncome">₹0.00</div>
      </div>
      <div class="card card--expense">
        <div class="card-icon expense-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
        </div>
        <div class="card-label">Total Expenses</div>
        <div class="card-amount expense-text" id="totalExpenses">₹0.00</div>
      </div>
    </section>

    <div class="content-grid">

      <!-- Add Transaction -->
      <section class="panel panel--form" aria-label="Add Transaction">
        <h2 class="panel-title">New Transaction</h2>

        <div class="type-toggle" role="group" aria-label="Transaction type">
          <button class="type-btn active" data-type="expense" id="expenseBtn">Expense</button>
          <button class="type-btn" data-type="income" id="incomeBtn">Income</button>
        </div>

        <div class="form-group">
          <label class="form-label" for="description">Description</label>
          <input class="form-input" type="text" id="description" placeholder="e.g. Grocery shopping" maxlength="60" autocomplete="off" />
          <span class="error-msg" id="descError"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="amount">Amount (₹)</label>
            <input class="form-input" type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" />
            <span class="error-msg" id="amtError"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select class="form-input form-select" id="category">
              <option value="">Select category</option>
              <optgroup label="Expenses" id="expenseOptions">
                <option value="Food">🍔 Food & Dining</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Entertainment">🎬 Entertainment</option>
                <option value="Health">💊 Health</option>
                <option value="Utilities">⚡ Utilities</option>
                <option value="Education">📚 Education</option>
                <option value="Other">📦 Other</option>
              </optgroup>
              <optgroup label="Income" id="incomeOptions" style="display:none">
                <option value="Salary">💼 Salary</option>
                <option value="Freelance">💻 Freelance</option>
                <option value="Investment">📈 Investment</option>
                <option value="Gift">🎁 Gift</option>
                <option value="Other">📦 Other</option>
              </optgroup>
            </select>
            <span class="error-msg" id="catError"></span>
          </div>
        </div>

        <button class="btn-primary" id="addTransactionBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Transaction
        </button>
      </section>

      <!-- Analytics -->
      <section class="panel panel--chart" aria-label="Expense Analytics">
        <h2 class="panel-title">Expense Breakdown</h2>
        <div class="chart-container">
          <canvas id="analyticsChart"></canvas>
          <div class="chart-empty" id="chartEmpty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
            </svg>
            <p>No expenses yet</p>
          </div>
        </div>
        <div class="legend" id="chartLegend"></div>
      </section>

    </div>

    <!-- Transactions List -->
    <section class="panel panel--list" aria-label="Transaction History">
      <div class="list-header">
        <h2 class="panel-title">Transactions</h2>
        <span class="transaction-count" id="txCount">0 entries</span>
      </div>
      <div class="transactions-list" id="transactionsList">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          <p>No transactions yet</p>
          <span>Add your first transaction above</span>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
