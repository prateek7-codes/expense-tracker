<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <header class="navbar">
    <div class="navbar-inner">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M10 2.5C5.858 2.5 2.5 5.858 2.5 10S5.858 17.5 10 17.5 17.5 14.142 17.5 10 14.142 2.5 10 2.5z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 10h6M10 7v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">SpendWise</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="sun-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.1 4.1l1.1 1.1M14.8 14.8l1.1 1.1M4.1 15.9l1.1-1.1M14.8 5.2l1.1-1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 20 20" fill="none">
          <path d="M17 11.5a7 7 0 1 1-9-9 5.5 5.5 0 0 0 9 9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="app">

    <!-- ── Balance Hero ── -->
    <section class="hero-section">
      <p class="hero-eyebrow">Total Balance</p>
      <h1 class="hero-amount" id="totalBalance">₹0.00</h1>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-icon stat-icon--up">
            <svg viewBox="0 0 12 12" fill="none"><path d="M6 9.5V2.5M2.5 6l3.5-3.5L9.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <div class="stat-body">
            <span class="stat-label">Income</span>
            <span class="stat-value stat-value--income" id="totalIncome">₹0.00</span>
          </div>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-icon stat-icon--down">
            <svg viewBox="0 0 12 12" fill="none"><path d="M6 2.5v7M9.5 6 6 9.5 2.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <div class="stat-body">
            <span class="stat-label">Expenses</span>
            <span class="stat-value stat-value--expense" id="totalExpenses">₹0.00</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Main Content ── -->
    <div class="content">

      <!-- Left Panel -->
      <div class="panel-left">

        <!-- Add Transaction Card -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">New Transaction</h2>
          </div>

          <div class="type-switch" role="group">
            <button class="type-btn active" id="expenseBtn" data-type="expense">
              <svg viewBox="0 0 14 14" fill="none"><path d="M7 1v12M12 7H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Expense
            </button>
            <button class="type-btn" id="incomeBtn" data-type="income">
              <svg viewBox="0 0 14 14" fill="none"><path d="M7 1v12M12 7H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Income
            </button>
          </div>

          <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <input class="form-input" id="description" type="text" placeholder="What was this for?" maxlength="60" autocomplete="off"/>
            <p class="form-error" id="descError"></p>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="amount">Amount</label>
              <div class="input-with-prefix">
                <span class="input-prefix">₹</span>
                <input class="form-input form-input--prefixed" id="amount" type="number" placeholder="0.00" min="0.01" step="0.01"/>
              </div>
              <p class="form-error" id="amtError"></p>
            </div>
            <div class="form-group">
              <label class="form-label" for="category">Category</label>
              <select class="form-input form-select" id="category">
                <option value="">Choose…</option>
                <optgroup label="Expenses" id="expenseOptions">
                  <option value="Food">🍔 Food & Dining</option>
                  <option value="Transport">🚗 Transport</option>
                  <option value="Shopping">🛍 Shopping</option>
                  <option value="Entertainment">🎬 Entertainment</option>
                  <option value="Health">💊 Health</option>
                  <option value="Utilities">⚡ Utilities</option>
                  <option value="Education">📚 Education</option>
                  <option value="Other">📦 Other</option>
                </optgroup>
                <optgroup label="Income" id="incomeOptions" style="display:none">
                  <option value="Salary">💼 Salary</option>
                  <option value="Freelance">💻 Freelance</option>
                  <option value="Investment">📈 Investment</option>
                  <option value="Gift">🎁 Gift</option>
                  <option value="Other">📦 Other</option>
                </optgroup>
              </select>
              <p class="form-error" id="catError"></p>
            </div>
          </div>

          <button class="btn-add" id="addTransactionBtn">
            <svg viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Transaction
          </button>
        </div>

        <!-- Chart Card -->
        <div class="card card--chart">
          <div class="card-header">
            <h2 class="card-title">Spending Breakdown</h2>
          </div>
          <div class="chart-area">
            <canvas id="analyticsChart" style="display:none"></canvas>
            <div class="chart-placeholder" id="chartEmpty">
              <div class="placeholder-ring"></div>
              <span>No expense data</span>
            </div>
          </div>
          <div class="chart-legend" id="chartLegend"></div>
        </div>

      </div>

      <!-- Right Panel: Transactions -->
      <div class="card card--transactions panel-right">
        <div class="card-header card-header--row">
          <h2 class="card-title">Transactions</h2>
          <span class="tx-badge" id="txCount">0</span>
        </div>
        <div class="tx-list" id="transactionsList">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">
              <svg viewBox="0 0 48 48" fill="none">
                <rect x="6" y="12" width="36" height="26" rx="4" stroke="currentColor" stroke-width="1.5"/>
                <path d="M6 20h36" stroke="currentColor" stroke-width="1.5"/>
                <path d="M16 30h8M16 35h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <p class="empty-title">No transactions yet</p>
            <p class="empty-sub">Add an income or expense to get started</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
